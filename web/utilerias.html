<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Utilerias - Generador de Prompts</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --surface-2: #f0f3f6;
      --line: #d8e0e8;
      --text: #14202b;
      --muted: #5a6b7b;
      --accent: #0b7285;
      --ok: #2b8a3e;
      --warn: #e67700;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 15% 15%, #dff4f7 0%, transparent 40%),
        radial-gradient(circle at 85% 85%, #ffe8cc 0%, transparent 45%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 28px 20px 40px;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
    }

    .hero {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 14px;
    }

    .hero h1 {
      margin: 0 0 6px;
      font-size: 1.35rem;
      letter-spacing: 0.02em;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .btn-main {
      background: var(--accent);
      color: #fff;
    }

    .btn-alt {
      background: var(--surface);
      border: 1px solid var(--line);
      color: var(--text);
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .panel h2 {
      margin: 0;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--muted);
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
      font-size: 0.85rem;
    }

    th {
      text-align: left;
      color: var(--muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      background: #fbfcfd;
    }

    td textarea {
      width: 100%;
      min-height: 72px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px;
      font: 0.8rem/1.45 Consolas, monospace;
      background: #fff;
      color: var(--text);
    }

    .status {
      padding: 4px 8px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      display: inline-block;
      letter-spacing: 0.04em;
    }

    .s-pending { background: #eef2f7; color: #52606d; }
    .s-ok { background: #e6f8ea; color: var(--ok); }
    .s-fix { background: #fff4e6; color: var(--warn); }

    .result-block {
      border-top: 1px solid var(--line);
      padding: 12px 14px;
      background: #fcfdff;
      display: grid;
      gap: 10px;
    }

    .result-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      padding: 10px;
    }

    .result-item h3 {
      margin: 0 0 8px;
      font-size: 0.88rem;
    }

    pre {
      margin: 8px 0 0;
      white-space: pre-wrap;
      background: #f5f7fa;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      font: 0.78rem/1.45 Consolas, monospace;
      max-height: 320px;
      overflow: auto;
    }

    .meta {
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: 4px;
    }

    @media (max-width: 700px) {
      body { padding: 16px 10px 28px; }
      .hero h1 { font-size: 1.12rem; }
      .hero p { font-size: 0.82rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>Utilerias: Generador de Prompts</h1>
      <p>Lista de solicitudes para generar prompts. Al presionar Procesar, cada item devuelve un prompt final usable o un mensaje de correccion.</p>
      <p class="meta">Ruta recomendada: /utilerias</p>
    </section>

    <div class="toolbar">
      <button class="btn-main" id="btnProcess">Procesar</button>
      <button class="btn-alt" id="btnReload">Recargar lista</button>
    </div>

    <section class="panel">
      <h2>Solicitudes</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nombre</th>
              <th>Tarea</th>
              <th>Objetivo</th>
              <th>Restricciones</th>
              <th>Salida Esperada</th>
              <th>Estado</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
      <div class="result-block" id="results"></div>
    </section>
  </div>

  <script>
    let stateItems = [];

    function statusClass(status) {
      if (status === "ok") return "status s-ok";
      if (status === "requiere_correccion") return "status s-fix";
      return "status s-pending";
    }

    function statusLabel(status) {
      if (status === "ok") return "OK";
      if (status === "requiere_correccion") return "CORREGIR";
      return "PENDIENTE";
    }

    function renderRows() {
      const tbody = document.getElementById("rows");
      tbody.innerHTML = "";
      stateItems.forEach((item) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${item.id || ""}</td>
          <td><textarea data-field="nombre" data-id="${item.id}">${item.nombre || ""}</textarea></td>
          <td><textarea data-field="tarea" data-id="${item.id}">${item.tarea || ""}</textarea></td>
          <td><textarea data-field="objetivo" data-id="${item.id}">${item.objetivo || ""}</textarea></td>
          <td><textarea data-field="restricciones" data-id="${item.id}">${item.restricciones || ""}</textarea></td>
          <td><textarea data-field="salida_esperada" data-id="${item.id}">${item.salida_esperada || ""}</textarea></td>
          <td><span class="${statusClass(item.estado)}">${statusLabel(item.estado)}</span></td>
        `;
        tbody.appendChild(tr);
      });

      tbody.querySelectorAll("textarea").forEach((el) => {
        el.addEventListener("input", () => {
          const id = el.getAttribute("data-id");
          const field = el.getAttribute("data-field");
          const target = stateItems.find((x) => x.id === id);
          if (target) target[field] = el.value;
        });
      });
    }

    function renderResults(results) {
      const panel = document.getElementById("results");
      panel.innerHTML = "";
      if (!results || results.length === 0) {
        panel.innerHTML = "<div class='meta'>Sin resultados aun.</div>";
        return;
      }

      results.forEach((r) => {
        const box = document.createElement("div");
        box.className = "result-item";
        const isOk = r.status === "PROMPT_OK";
        const title = isOk ? "PROMPT_OK" : "REQUIERE_CORRECCION";
        const errs = (r.errores || []).map((e) => `- ${e}`).join("\n");
        const recs = (r.recomendaciones || []).map((e) => `- ${e}`).join("\n");
        box.innerHTML = `
          <h3>${r.id} · ${title}</h3>
          <div class="meta">Errores:</div>
          <pre>${errs || "(sin errores)"}</pre>
          <div class="meta">Prompt final:</div>
          <pre>${r.prompt_final || "(no generado)"}</pre>
          <div class="meta">Recomendaciones:</div>
          <pre>${recs || "(sin recomendaciones)"}</pre>
        `;
        panel.appendChild(box);
      });
    }

    async function loadRequests() {
      const res = await fetch("/api/utilerias/requests");
      const data = await res.json();
      stateItems = data.items || [];
      renderRows();
      renderResults([]);
    }

    async function processRequests() {
      const res = await fetch("/api/utilerias/process", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ items: stateItems })
      });
      const data = await res.json();
      const results = data.results || [];

      const byId = new Map(results.map((r) => [r.id, r.status]));
      stateItems = stateItems.map((x) => {
        const status = byId.get(x.id);
        if (status === "PROMPT_OK") return { ...x, estado: "ok" };
        if (status === "REQUIERE_CORRECCION") return { ...x, estado: "requiere_correccion" };
        return x;
      });
      renderRows();
      renderResults(results);
    }

    document.getElementById("btnReload").addEventListener("click", loadRequests);
    document.getElementById("btnProcess").addEventListener("click", processRequests);

    loadRequests();
  </script>
</body>
</html>
